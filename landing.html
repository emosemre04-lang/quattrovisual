<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer mon site — Quattro Visual</title>
<meta name="description" content="Site web professionnel livré en 5 jours à partir de 490€. Répondez à 4 questions et recevez votre offre.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:      #6b3df5;
  --accent-2:    #a06bff;
  --accent-dark: #5429d8;
  --accent-soft: #f0ecff;
  --bg:          #ffffff;
  --bg-soft:     #faf9fc;
  --border:      #ece8f5;
  --text:        #0f0a1e;
  --text-2:      #6b6880;
  --green:       #16a34a;
  --green-soft:  #dcfce7;
  --shadow-sm:   0 1px 4px rgba(0,0,0,.06);
  --shadow-md:   0 4px 20px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
  --r:           16px;
  --spring:      cubic-bezier(.34,1.56,.64,1);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── Accent line ── */
.accent-line {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent), var(--accent-2), var(--accent), var(--accent-dark));
  z-index: 200; pointer-events: none;
}

/* ── Nav ── */
.lnav {
  position: fixed; top: 3px; left: 0; right: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.lnav .logo { height: 26px; }

.btn-back {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none;
  color: var(--text-2); font-size: 14px; font-family: inherit;
  cursor: pointer; padding: 6px 10px; border-radius: 8px;
  transition: background .2s, color .2s;
}
.btn-back:hover { background: var(--accent-soft); color: var(--accent); }
.btn-back.hidden { opacity: 0; pointer-events: none; }

/* ── Progress bar ── */
.progress-wrap {
  position: fixed; top: 59px; left: 0; right: 0; height: 4px;
  background: var(--border); z-index: 99;
  transition: opacity .3s;
}
.progress-wrap.hidden { opacity: 0; pointer-events: none; }
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 0 2px 2px 0;
  transition: width .55s cubic-bezier(.22,1,.36,1);
}

/* ── Layout ── */
.lmain {
  min-height: 100dvh;
  padding-top: 63px;
  display: flex; flex-direction: column; align-items: center;
}
#screen-container {
  width: 100%; max-width: 520px;
  padding: 36px 20px 80px;
  transition: opacity .22s ease, transform .22s ease;
}
#screen-container.exiting  { opacity: 0; transform: translateX(-24px); }
#screen-container.entering { opacity: 0; transform: translateX(24px); transition: none; }

/* ── Hero ── */
.hero-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--accent-soft); color: var(--accent);
  font-size: 12px; font-weight: 600;
  padding: 5px 13px; border-radius: 99px;
  margin-bottom: 20px; letter-spacing: .03em;
}
.hero-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.hero-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(27px, 7.5vw, 44px);
  font-weight: 800; line-height: 1.1;
  letter-spacing: -.025em; margin-bottom: 16px;
}
.hero-title em {
  font-style: normal;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-sub {
  font-size: 16px; color: var(--text-2); line-height: 1.65; margin-bottom: 28px;
}

/* 4 trust badges: 2-col mobile, 4-col desktop */
.trust-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 20px;
}
@media (min-width: 480px) { .trust-grid { grid-template-columns: repeat(4, 1fr); } }
.trust-badge {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 99px; padding: 8px 10px;
  font-size: 12px; color: var(--text-2);
  white-space: nowrap;
}

/* ── Q1 Big cards ── */
.q1-card {
  display: block; width: 100%; text-align: left;
  padding: 18px 20px;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--r);
  cursor: pointer; font-family: inherit; color: var(--text);
  margin-bottom: 10px;
  transition: border-color .18s, background .18s, transform .2s var(--spring), box-shadow .2s;
}
.q1-card:hover {
  border-color: var(--accent); background: var(--accent-soft);
  transform: translateY(-2px); box-shadow: var(--shadow-md);
}
.q1-card:active { transform: scale(.98); }
.q1-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 10px;
}
.q1-icon-title { display: flex; align-items: center; gap: 10px; }
.q1-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
.q1-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
.q1-price {
  background: var(--accent); color: #fff;
  font-size: 13px; font-weight: 700;
  padding: 3px 11px; border-radius: 99px;
  white-space: nowrap; flex-shrink: 0;
  margin-top: 2px;
}
.q1-price.devis { background: var(--bg-soft); color: var(--accent); border: 1px solid var(--accent); }
.q1-desc {
  font-size: 13px; color: var(--text-2); line-height: 1.55;
  margin-bottom: 12px;
}
.q1-checks { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.q1-checks li {
  display: flex; align-items: center; gap: 7px;
  font-size: 12.5px; color: var(--text);
}
.ck {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--green-soft); flex-shrink: 0;
}
.ck svg { stroke: var(--green); }

/* ── Q generic ── */
.q-label {
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px;
}
.q-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(20px, 5.5vw, 30px);
  font-weight: 700; line-height: 1.2; margin-bottom: 8px;
}
.q-sub { font-size: 14px; color: var(--text-2); margin-bottom: 24px; line-height: 1.5; }

/* ── Option cards (Q3-Q4) ── */
.options-grid { display: flex; flex-direction: column; gap: 10px; }
.opt-card {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--r);
  cursor: pointer; text-align: left; width: 100%;
  font-family: inherit; color: var(--text);
  transition: border-color .18s, background .18s, transform .2s var(--spring), box-shadow .2s;
}
.opt-card:hover {
  border-color: var(--accent); background: var(--accent-soft);
  transform: translateY(-2px); box-shadow: var(--shadow-md);
}
.opt-card:active { transform: scale(.97); }
.opt-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
.opt-text { flex: 1; }
.opt-title { font-size: 15px; font-weight: 600; display: block; margin-bottom: 2px; }
.opt-desc  { font-size: 13px; color: var(--text-2); }
.opt-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
}

/* ── Text inputs ── */
.field-wrap { margin-bottom: 4px; }
.form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.text-input {
  width: 100%; padding: 15px 17px;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--r);
  font-size: 16px; font-family: inherit; color: var(--text);
  outline: none; transition: border-color .18s, box-shadow .18s;
}
.text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107,61,245,.14); }
.text-input.error { border-color: #e53e3e; }
.field-error { color: #e53e3e; font-size: 12px; margin-top: 5px; display: none; }
.field-error.show { display: block; }

/* ── Buttons ── */
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff; font-size: 16px; font-weight: 600; font-family: inherit;
  border: none; border-radius: var(--r); cursor: pointer;
  box-shadow: 0 4px 20px rgba(107,61,245,.4), 0 2px 8px rgba(107,61,245,.25);
  transition: transform .2s var(--spring), box-shadow .2s;
  letter-spacing: -.01em;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(107,61,245,.5); }
.btn-primary:active { transform: scale(.98); }

.btn-secondary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px 24px;
  background: var(--bg-soft); color: var(--text);
  font-size: 15px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--border); border-radius: var(--r);
  cursor: pointer; text-decoration: none;
  transition: background .18s, border-color .18s, color .18s;
}
.btn-secondary:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* ── Recap ── */
.recap-card {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; margin-bottom: 20px;
}
.recap-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 18px; border-bottom: 1px solid var(--border);
}
.recap-row:last-child { border-bottom: none; }
.recap-label { font-size: 12px; color: var(--text-2); min-width: 120px; padding-top: 1px; flex-shrink: 0; }
.recap-val   { font-size: 14px; font-weight: 600; }
.recap-delivery {
  font-size: 14px; color: var(--green); font-weight: 500;
  margin-bottom: 18px; display: flex; align-items: center; gap: 6px;
}
.note-sm { font-size: 13px; color: var(--text-2); text-align: center; margin-top: 12px; }

/* ── Testimonial ── */
.testi-card {
  background: var(--accent-soft); border: 1px solid rgba(107,61,245,.14);
  border-radius: var(--r); padding: 22px; margin-bottom: 18px; position: relative;
}
.testi-quote { font-size: 52px; line-height: .8; color: var(--accent); opacity: .18; font-family: Georgia, serif; position: absolute; top: 14px; left: 18px; }
.testi-text  { font-size: 15px; line-height: 1.65; font-style: italic; padding-top: 16px; margin-bottom: 16px; }
.testi-author { display: flex; align-items: center; gap: 10px; }
.testi-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0;
}
.testi-name { font-weight: 600; font-size: 14px; }
.testi-role { font-size: 12px; color: var(--text-2); }

/* ── Mini portfolio carousel ── */
.mp-wrap { margin: 16px 0 20px; }
.mp-label-top { font-size: 11px; font-weight: 600; color: var(--text-2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
.mp-track { position: relative; height: 190px; border-radius: 12px; overflow: hidden; }
.mp-slide {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity .5s ease;
  display: flex; flex-direction: column;
  border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
}
.mp-slide.active { opacity: 1; }
.mp-bar {
  background: var(--bg-soft); padding: 7px 12px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.mp-dots { display: flex; gap: 4px; flex-shrink: 0; }
.mp-dots span { width: 8px; height: 8px; border-radius: 50%; display: block; }
.mp-dots span:nth-child(1) { background: #ff5f57; }
.mp-dots span:nth-child(2) { background: #ffbd2e; }
.mp-dots span:nth-child(3) { background: #28c940; }
.mp-url-bar {
  flex: 1; text-align: center;
  font-size: 10px; color: var(--text-2);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px;
  font-family: 'JetBrains Mono', monospace, sans-serif;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mp-screen { flex: 1; overflow: hidden; }
.mp-screen img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
.mp-meta {
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 7px 12px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.mp-name  { font-size: 12px; font-weight: 700; }
.mp-sector { font-size: 11px; color: var(--text-2); }
.mp-indicators { display: flex; gap: 6px; justify-content: center; margin-top: 9px; }
.mp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background .3s, transform .3s var(--spring); }
.mp-dot.active { background: var(--accent); transform: scale(1.4); }

/* ── Stats row ── */
.stats-row  { display: flex; gap: 10px; margin-bottom: 22px; }
.stat-pill  { flex: 1; text-align: center; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 12px; padding: 13px 8px; }
.stat-pill .num { font-family: 'Inter Tight', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); display: block; }
.stat-pill .lbl { font-size: 11px; color: var(--text-2); }

/* ── Form ── */
.form-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(22px, 5.5vw, 30px);
  font-weight: 800; line-height: 1.15; margin-bottom: 8px;
}
.form-sub { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
.form-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }

/* Badges sous bouton form */
.form-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 14px; }
.form-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--text-2);
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 11px;
}

/* ── Confirmation ── */
.confirm-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  box-shadow: 0 8px 24px rgba(34,197,94,.35);
}
.confirm-title { font-family: 'Inter Tight', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 12px; text-align: center; }
.confirm-sub   { font-size: 15px; color: var(--text-2); line-height: 1.6; text-align: center; margin-bottom: 30px; }
.steps-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.step-item  { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 12px; }
.step-num   { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-txt   { font-size: 14px; font-weight: 500; }

.spacer-sm { height: 12px; }

@media (max-width: 380px) {
  #screen-container { padding: 24px 14px 70px; }
  .stats-row { flex-direction: column; }
  .recap-label { min-width: 100px; }
}
</style>
</head>
<body>

<div class="accent-line"></div>

<nav class="lnav">
  <a href="index.html" aria-label="Quattro Visual">
    <img src="assets/logo-v2-bold.png" class="logo" alt="Quattro Visual">
  </a>
  <button class="btn-back hidden" id="btn-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Retour
  </button>
</nav>

<div class="progress-wrap hidden" id="progress-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<main class="lmain">
  <div id="screen-container"></div>
</main>

<script>
// TODO: Meta Pixel — fbq('init','PIXEL_ID'); fbq('track','PageView');
// TODO: Supabase  — const sb = window.supabase.createClient(URL, KEY);

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const state = {
  step: 1,
  busy: false,
  fromSurMesure: false,
  a: {
    typeSite:       ``,
    metier:         ``,
    presenceGoogle: ``,
    desirPrincipal: ``,
    prenom:         ``,
    nomEntreprise:  ``,
    ville:          ``,
    telephone:      ``
  }
};

/* Screens: 1 Hero · 2 Q1 · 3 Q2 · 4 Q3 · 5 Q4 · 6 Recap · 7 Testi · 8 Form · 9 Confirm */
const PROGRESS  = {1:0, 2:25, 3:50, 4:75, 5:100, 6:100, 7:100, 8:100, 9:0};
const BACK_MAP  = {2:1, 3:2, 4:3, 5:4, 6:5, 8:7};   /* step 7 testimonial : no back */
const HIDE_BACK = new Set([1, 7, 9]);

let carouselTimer = null;

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function goTo(n) {
  if (state.busy) return;
  state.busy = true;
  clearInterval(carouselTimer);
  const el = document.getElementById(`screen-container`);
  el.classList.add(`exiting`);
  setTimeout(() => {
    state.step = n;
    window.scrollTo(0, 0);
    render();
    el.classList.remove(`exiting`);
    el.classList.add(`entering`);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.classList.remove(`entering`);
      state.busy = false;
    }));
  }, 220);
}

document.getElementById(`btn-back`).addEventListener(`click`, () => {
  if (state.busy) return;
  const prev = (state.fromSurMesure && state.step === 8) ? 2 : BACK_MAP[state.step];
  if (prev !== undefined) goTo(prev);
});

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function esc(s) {
  return String(s || ``).replace(/&/g,`&amp;`).replace(/</g,`&lt;`).replace(/>/g,`&gt;`).replace(/"/g,`&quot;`);
}

function getPrix() {
  if (state.a.typeSite === `Vitrine`)    return `490\u20ac`;
  if (state.a.typeSite === `Boutique`)   return `790\u20ac`;
  return null;
}

function getDeliveryDate() {
  const d = new Date();
  d.setDate(d.getDate() + 5);
  const jours  = [`dimanche`,`lundi`,`mardi`,`mercredi`,`jeudi`,`vendredi`,`samedi`];
  const mois   = [`janvier`,`f\u00e9vrier`,`mars`,`avril`,`mai`,`juin`,`juillet`,`ao\u00fbt`,`septembre`,`octobre`,`novembre`,`d\u00e9cembre`];
  return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]}`;
}

const ARROW = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;

const CHK_SVG = `<span class="ck"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`;

/* Pick answer & route */
function pick(field, val, next) {
  state.a[field] = val;
  // TODO: Meta Pixel — fbq('trackCustom','QuizAnswer',{field,val});
  if (field === `typeSite` && val === `Sur-mesure`) {
    state.fromSurMesure = true;
    goTo(8);
  } else {
    if (field === `typeSite`) state.fromSurMesure = false;
    goTo(next);
  }
}

/* Delegate clicks on q1-cards and opt-cards */
document.addEventListener(`click`, e => {
  if (state.busy) return;
  /* Q1 big cards */
  const q1 = e.target.closest(`.q1-card[data-field]`);
  if (q1) { pick(q1.dataset.field, q1.dataset.val, +q1.dataset.next); return; }
  /* Generic option cards */
  const opt = e.target.closest(`.opt-card[data-field]`);
  if (opt) { pick(opt.dataset.field, opt.dataset.val, +opt.dataset.next); }
  /* Carousel dot */
  const dot = e.target.closest(`.mp-dot[data-idx]`);
  if (dot) { showSlide(+dot.dataset.idx); }
});

/* ═══════════════════════════════════════
   MINI PORTFOLIO CAROUSEL
═══════════════════════════════════════ */
const PORTFOLIO = [
  {url:`rnconstruction.bzh`,  img:`assets/portfolio/rnconstruction.png`, name:`RN Construction`,   sector:`BTP \u00b7 France`},
  {url:`bahnmotors.be`,       img:`assets/portfolio/bahnmotors.png`,      name:`Bahn Motors`,       sector:`Automobile \u00b7 Belgique`},
  {url:`trocplace.fr`,        img:`assets/portfolio/trocplace.png`,       name:`Trocplace`,         sector:`Marketplace \u00b7 France`},
  {url:`quattroshopping.com`, img:`assets/portfolio/quattroshopping.png`, name:`Quattro Shopping`,  sector:`E-commerce \u00b7 Europe`}
];

let carouselIdx = 0;

function showSlide(i) {
  carouselIdx = i;
  document.querySelectorAll(`.mp-slide`).forEach((s, j) => s.classList.toggle(`active`, j === i));
  document.querySelectorAll(`.mp-dot`).forEach((d, j)  => d.classList.toggle(`active`, j === i));
}

function startCarousel() {
  clearInterval(carouselTimer);
  carouselIdx = 0;
  showSlide(0);
  carouselTimer = setInterval(() => {
    showSlide((carouselIdx + 1) % PORTFOLIO.length);
  }, 2600);
}

function buildCarousel() {
  const slides = PORTFOLIO.map((p, i) => `
    <div class="mp-slide${i === 0 ? ` active` : ``}">
      <div class="mp-bar">
        <div class="mp-dots"><span></span><span></span><span></span></div>
        <div class="mp-url-bar">${p.url}</div>
      </div>
      <div class="mp-screen"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
      <div class="mp-meta"><span class="mp-name">${p.name}</span><span class="mp-sector">${p.sector}</span></div>
    </div>`).join(``);
  const dots = PORTFOLIO.map((_, i) =>
    `<span class="mp-dot${i === 0 ? ` active` : ``}" data-idx="${i}"></span>`).join(``);
  return `
    <p class="mp-label-top">Nos r\u00e9alisations</p>
    <div class="mp-track">${slides}</div>
    <div class="mp-indicators">${dots}</div>`;
}

/* ═══════════════════════════════════════

function optCard(icon, title, desc, field, val, next) {
  return `<button class="opt-card" data-field="${field}" data-val="${val}" data-next="${next}">
    <span class="opt-icon">${icon}</span>
    <span class="opt-text"><span class="opt-title">${title}</span><span class="opt-desc">${desc}</span></span>
    <span class="opt-check"></span>
  </button>`;
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render() {
  const map = {1:screenHero, 2:screenQ1, 3:screenQ2, 4:screenQ3, 5:screenQ4, 6:screenRecap, 7:screenTestimonial, 8:screenForm, 9:screenConfirm};
  document.getElementById(`screen-container`).innerHTML = (map[state.step] || screenHero)();

  /* Progress */
  const show = state.step >= 2 && state.step <= 8;
  document.getElementById(`progress-wrap`).classList.toggle(`hidden`, !show);
  const pb = document.getElementById(`progress-bar`);
  if (pb) pb.style.width = (PROGRESS[state.step] || 0) + `%`;

  /* Back button */
  document.getElementById(`btn-back`).classList.toggle(`hidden`, HIDE_BACK.has(state.step));

  /* Attach listeners */
  const form = document.getElementById(`lead-form`);
  if (form) form.addEventListener(`submit`, submitForm);
  const mi = document.getElementById(`f-metier`);
  if (mi)  mi.addEventListener(`keydown`, e => { if (e.key === `Enter`) continueMetier(); });

  /* Start carousel on testimonial screen */
  if (state.step === 7) {
    requestAnimationFrame(() => startCarousel());
  }
}

/* ═══════════════════════════════════════
   FORM LOGIC
═══════════════════════════════════════ */
function continueMetier() {
  const inp = document.getElementById(`f-metier`);
  const err = document.getElementById(`err-metier`);
  if (!inp) return;
  const val = inp.value.trim();
  if (val.length < 2) {
    inp.classList.add(`error`);
    if (err) err.classList.add(`show`);
    inp.focus();
    return;
  }
  state.a.metier = val;
  goTo(4);
}

function submitForm(e) {
  e.preventDefault();
  const fields = [
    {id:`f-prenom`,    key:`prenom`,       errId:`err-prenom`,    ok: v => v.length >= 2},
    {id:`f-entreprise`,key:`nomEntreprise`, errId:`err-entreprise`,ok: v => v.length >= 2},
    {id:`f-ville`,     key:`ville`,         errId:`err-ville`,     ok: v => v.length >= 2},
    {id:`f-tel`,       key:`telephone`,     errId:`err-tel`,       ok: v => /^\+?[\d\s\-\.\(\)]{9,}$/.test(v)}
  ];
  let valid = true;
  fields.forEach(f => {
    const inp = document.getElementById(f.id);
    const err = document.getElementById(f.errId);
    if (!inp) return;
    const val = inp.value.trim();
    const ok  = f.ok(val);
    inp.classList.toggle(`error`, !ok);
    if (err) err.classList.toggle(`show`, !ok);
    if (ok) state.a[f.key] = val;
    else valid = false;
  });
  if (!valid) return;

  const lead = Object.assign({}, state.a, {
    date: new Date().toLocaleDateString(`fr-FR`),
    timestamp: Date.now()
  });
  try {
    const arr = JSON.parse(localStorage.getItem(`qv_leads`) || `[]`);
    arr.unshift(lead);
    localStorage.setItem(`qv_leads`, JSON.stringify(arr));
  } catch(_) {}

  // TODO: Supabase — await sb.from('leads').insert(lead);
  // TODO: Meta Pixel — fbq('track','Lead',{value: state.a.typeSite === 'Boutique' ? 790 : 490, currency:'EUR'});

  goTo(9);
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
render();
</script>
