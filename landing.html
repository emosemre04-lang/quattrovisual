<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer mon site — Quattro Visual</title>
<meta name="description" content="Site web professionnel livré en 5 jours à partir de 490€. Répondez à 4 questions et recevez votre offre.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:      #6b3df5;
  --accent-2:    #a06bff;
  --accent-dark: #5429d8;
  --accent-soft: #f0ecff;
  --bg:          #ffffff;
  --bg-soft:     #faf9fc;
  --border:      #ece8f5;
  --text:        #0f0a1e;
  --text-2:      #6b6880;
  --green:       #16a34a;
  --green-soft:  #dcfce7;
  --shadow-sm:   0 1px 4px rgba(0,0,0,.06);
  --shadow-md:   0 4px 20px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
  --r:           16px;
  --spring:      cubic-bezier(.34,1.56,.64,1);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── Accent line ── */
.accent-line {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent), var(--accent-2), var(--accent), var(--accent-dark));
  z-index: 200; pointer-events: none;
}

/* ── Nav ── */
.lnav {
  position: fixed; top: 3px; left: 0; right: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
/* Logo forcé en noir */
.lnav .logo {
  height: 26px;
  filter: brightness(0) saturate(0);
}

.btn-back {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none;
  color: var(--text-2); font-size: 14px; font-family: inherit;
  cursor: pointer; padding: 6px 10px; border-radius: 8px;
  transition: background .2s, color .2s;
}
.btn-back:hover { background: var(--accent-soft); color: var(--accent); }
.btn-back.hidden { opacity: 0; pointer-events: none; }

/* ── Progress bar ── */
.progress-wrap {
  position: fixed; top: 59px; left: 0; right: 0; height: 4px;
  background: var(--border); z-index: 99;
  transition: opacity .3s;
}
.progress-wrap.hidden { opacity: 0; pointer-events: none; }
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 0 2px 2px 0;
  transition: width .55s cubic-bezier(.22,1,.36,1);
}

/* ── Layout ── */
.lmain {
  min-height: 100dvh;
  padding-top: 63px;
  display: flex; flex-direction: column; align-items: center;
}
#screen-container {
  width: 100%; max-width: 520px;
  padding: 36px 20px 80px;
  transition: opacity .22s ease, transform .22s ease;
}
#screen-container.exiting  { opacity: 0; transform: translateX(-24px); }
#screen-container.entering { opacity: 0; transform: translateX(24px); transition: none; }

/* ── Hero ── */
.hero-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--accent-soft); color: var(--accent);
  font-size: 12px; font-weight: 600;
  padding: 5px 13px; border-radius: 99px;
  margin-bottom: 20px; letter-spacing: .03em;
}
.hero-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.hero-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(27px, 7.5vw, 44px);
  font-weight: 800; line-height: 1.1;
  letter-spacing: -.025em; margin-bottom: 16px;
}
.hero-title em {
  font-style: normal;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-sub { font-size: 16px; color: var(--text-2); line-height: 1.65; margin-bottom: 28px; }

/* 4 trust badges: 2-col mobile / 4-col desktop */
.trust-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px;
}
@media (min-width: 480px) { .trust-grid { grid-template-columns: repeat(4, 1fr); } }
.trust-badge {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 99px; padding: 8px 10px;
  font-size: 12px; color: var(--text-2); white-space: nowrap;
}

/* ── Q1 Big cards — CORRECTION 1 ── */
.q1-card {
  display: block; width: 100%; text-align: left;
  background: #ffffff;
  border: 2px solid #E5E7EB;
  border-radius: 20px;
  box-shadow: 0 4px 12px rgba(0,0,0,.06);
  padding: 24px;
  margin-bottom: 20px;
  cursor: pointer; font-family: inherit; color: var(--text);
  transition: all 250ms ease-out;
}
.q1-card:hover {
  border-color: #7C3AED;
  box-shadow: 0 8px 24px rgba(124,58,237,.15);
  transform: translateY(-2px);
}
.q1-card:active {
  border-color: #7C3AED;
  background: #FAF8FF;
  transform: translateY(0);
}
.q1-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 12px;
}
.q1-icon-title { display: flex; align-items: center; gap: 10px; }
.q1-icon  { font-size: 28px; line-height: 1; flex-shrink: 0; }
.q1-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
.q1-price {
  background: var(--accent); color: #fff;
  font-size: 13px; font-weight: 700;
  padding: 4px 12px; border-radius: 99px;
  white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}
.q1-price.devis { background: var(--bg-soft); color: var(--accent); border: 1.5px solid var(--accent); }
.q1-desc {
  font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 14px;
}
.q1-checks { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.q1-checks li { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.ck {
  display: inline-flex; align-items: center; justify-content: center;
  width: 17px; height: 17px; border-radius: 50%;
  background: var(--green-soft); flex-shrink: 0;
}
.ck svg { stroke: var(--green); }

/* ── Q generic ── */
.q-label {
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px;
}
.q-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(20px, 5.5vw, 30px);
  font-weight: 700; line-height: 1.2; margin-bottom: 8px;
}
.q-sub { font-size: 14px; color: var(--text-2); margin-bottom: 24px; line-height: 1.5; }

/* ── Option cards (Q3-Q4) ── */
.options-grid { display: flex; flex-direction: column; gap: 10px; }
.opt-card {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--r);
  cursor: pointer; text-align: left; width: 100%;
  font-family: inherit; color: var(--text);
  transition: border-color .18s, background .18s, transform .2s var(--spring), box-shadow .2s;
}
.opt-card:hover {
  border-color: var(--accent); background: var(--accent-soft);
  transform: translateY(-2px); box-shadow: var(--shadow-md);
}
.opt-card:active { transform: scale(.97); }
.opt-icon  { font-size: 22px; line-height: 1; flex-shrink: 0; }
.opt-text  { flex: 1; }
.opt-title { font-size: 15px; font-weight: 600; display: block; margin-bottom: 2px; }
.opt-desc  { font-size: 13px; color: var(--text-2); }
.opt-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }

/* ── Text inputs ── */
.field-wrap { margin-bottom: 4px; }
.form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.text-input {
  width: 100%; padding: 15px 17px;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--r);
  font-size: 16px; font-family: inherit; color: var(--text);
  outline: none; transition: border-color .18s, box-shadow .18s;
}
.text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107,61,245,.14); }
.text-input.error { border-color: #e53e3e; }
.field-error { color: #e53e3e; font-size: 12px; margin-top: 5px; display: none; }
.field-error.show { display: block; }

/* ── Buttons ── */
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff; font-size: 16px; font-weight: 600; font-family: inherit;
  border: none; border-radius: var(--r); cursor: pointer;
  box-shadow: 0 4px 20px rgba(107,61,245,.4), 0 2px 8px rgba(107,61,245,.25);
  transition: transform .2s var(--spring), box-shadow .2s;
  letter-spacing: -.01em;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(107,61,245,.5); }
.btn-primary:active { transform: scale(.98); }
.btn-primary.xl { padding: 20px 28px; font-size: 17px; border-radius: 18px; }

.btn-secondary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px 24px;
  background: var(--bg-soft); color: var(--text);
  font-size: 15px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--border); border-radius: var(--r);
  cursor: pointer; text-decoration: none;
  transition: background .18s, border-color .18s, color .18s;
}
.btn-secondary:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* ── Recap ── */
.recap-card {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; margin-bottom: 20px;
}
.recap-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 18px; border-bottom: 1px solid var(--border);
}
.recap-row:last-child { border-bottom: none; }
.recap-label { font-size: 12px; color: var(--text-2); min-width: 120px; padding-top: 1px; flex-shrink: 0; }
.recap-val   { font-size: 14px; font-weight: 600; }
.recap-delivery {
  font-size: 14px; color: var(--green); font-weight: 500;
  margin-bottom: 18px; display: flex; align-items: center; gap: 6px;
}
.note-sm { font-size: 13px; color: var(--text-2); text-align: center; margin-top: 12px; }

/* ── Form screen ── */
.form-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(22px, 5.5vw, 30px);
  font-weight: 800; line-height: 1.15; margin-bottom: 8px;
}
.form-sub { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
.form-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }

.form-badges {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 14px;
}
.form-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--text-2);
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 11px;
}

/* Trust bar sous le formulaire */
.trust-bar {
  display: flex; align-items: center; justify-content: center;
  flex-wrap: wrap; gap: 6px 10px;
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-2);
}
.trust-bar strong { color: var(--text); font-weight: 600; }
.trust-sep { color: var(--border); }

/* ── Confirmation — CORRECTION 3 ── */
@keyframes checkPop {
  0%   { transform: scale(0); opacity: 0; }
  65%  { transform: scale(1.12); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
.confirm-icon {
  width: 88px; height: 88px; border-radius: 50%;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  box-shadow: 0 10px 32px rgba(34,197,94,.38);
  animation: checkPop .8s cubic-bezier(.22,1,.36,1) both;
}
.confirm-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(24px, 6vw, 34px);
  font-weight: 800; text-align: center; margin-bottom: 10px;
}
.confirm-sub {
  font-size: 15px; color: var(--text-2);
  line-height: 1.65; text-align: center; margin-bottom: 28px;
}
.confirm-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: 0 4px 16px rgba(0,0,0,.06);
  padding: 6px 0; margin-bottom: 28px;
}
.confirm-info-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.confirm-info-row:last-child { border-bottom: none; }
.confirm-info-icon { font-size: 22px; flex-shrink: 0; line-height: 1; }
.confirm-info-text { font-size: 14px; font-weight: 500; }

/* WhatsApp row animation */
@keyframes waBounce {
  0%, 80%, 100% { transform: scale(1); }
  88%            { transform: scale(1.2); }
}
@keyframes waGlow {
  0%, 100% { color: var(--text); }
  50%       { color: #25D366; }
}
.wa-icon { display: inline-block; animation: waBounce 2.2s ease infinite; }
.wa-text { animation: waGlow 2.2s ease infinite; }

.confirm-note {
  font-size: 13px; color: var(--text-2);
  text-align: center; margin-top: 12px; line-height: 1.55;
}

.spacer-sm { height: 12px; }

@media (max-width: 380px) {
  #screen-container { padding: 24px 14px 70px; }
  .recap-label { min-width: 100px; }
}
</style>
</head>
<body>

<div class="accent-line"></div>

<nav class="lnav">
  <a href="index.html" aria-label="Quattro Visual">
    <img src="assets/logo-v2-bold.png" class="logo" alt="Quattro Visual">
  </a>
  <button class="btn-back hidden" id="btn-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Retour
  </button>
</nav>

<div class="progress-wrap hidden" id="progress-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<main class="lmain">
  <div id="screen-container"></div>
</main>

<script>
// TODO: Meta Pixel — fbq('init','PIXEL_ID'); fbq('track','PageView');
// TODO: Supabase  — const sb = window.supabase.createClient(URL, KEY);

/* ═══════════════════════════════════════
   STATE
   Screens: 1=Hero 2=Q1 3=Q2 4=Q3 5=Q4 6=Recap 7=Form 8=Confirm
═══════════════════════════════════════ */
const state = {
  step: 1,
  busy: false,
  fromSurMesure: false,
  a: {
    typeSite:       ``,
    metier:         ``,
    presenceGoogle: ``,
    desirPrincipal: ``,
    prenom:         ``,
    nomEntreprise:  ``,
    ville:          ``,
    telephone:      ``
  }
};

const PROGRESS  = {1:0, 2:25, 3:50, 4:75, 5:100, 6:100, 7:100, 8:0};
const BACK_MAP  = {2:1, 3:2, 4:3, 5:4, 6:5, 7:6};
const HIDE_BACK = new Set([1, 8]);

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function goTo(n) {
  if (state.busy) return;
  state.busy = true;
  const el = document.getElementById(`screen-container`);
  el.classList.add(`exiting`);
  setTimeout(() => {
    state.step = n;
    window.scrollTo(0, 0);
    render();
    el.classList.remove(`exiting`);
    el.classList.add(`entering`);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.classList.remove(`entering`);
      state.busy = false;
    }));
  }, 220);
}

document.getElementById(`btn-back`).addEventListener(`click`, () => {
  if (state.busy) return;
  /* Sur-mesure: form (7) revient sur Q1 (2) */
  const prev = (state.fromSurMesure && state.step === 7) ? 2 : BACK_MAP[state.step];
  if (prev !== undefined) goTo(prev);
});

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function esc(s) {
  return String(s || ``).replace(/&/g,`&amp;`).replace(/</g,`&lt;`).replace(/>/g,`&gt;`).replace(/"/g,`&quot;`);
}

function getPrix() {
  if (state.a.typeSite === `Vitrine`)  return `490\u20ac`;
  if (state.a.typeSite === `Boutique`) return `790\u20ac`;
  return null;
}

function getDeliveryDate() {
  const d = new Date();
  d.setDate(d.getDate() + 5);
  const jours = [`dimanche`,`lundi`,`mardi`,`mercredi`,`jeudi`,`vendredi`,`samedi`];
  const mois  = [`janvier`,`f\u00e9vrier`,`mars`,`avril`,`mai`,`juin`,`juillet`,`ao\u00fbt`,`septembre`,`octobre`,`novembre`,`d\u00e9cembre`];
  return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]}`;
}

const ARROW  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
const CHK_OK = `<span class="ck"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`;

function optCard(icon, title, desc, field, val, next) {
  return `<button class="opt-card" data-field="${field}" data-val="${val}" data-next="${next}">
    <span class="opt-icon">${icon}</span>
    <span class="opt-text"><span class="opt-title">${title}</span><span class="opt-desc">${desc}</span></span>
    <span class="opt-check"></span>
  </button>`;
}

/* ── Answer + route ── */
function pick(field, val, next) {
  state.a[field] = val;
  // TODO: Meta Pixel — fbq('trackCustom','QuizAnswer',{field,val});
  if (field === `typeSite` && val === `Sur-mesure`) {
    state.fromSurMesure = true;
    goTo(7); /* form direct */
  } else {
    if (field === `typeSite`) state.fromSurMesure = false;
    goTo(next);
  }
}

/* Delegation clics */
document.addEventListener(`click`, e => {
  if (state.busy) return;
  const q1  = e.target.closest(`.q1-card[data-field]`);
  if (q1)  { pick(q1.dataset.field, q1.dataset.val, +q1.dataset.next); return; }
  const opt = e.target.closest(`.opt-card[data-field]`);
  if (opt) { pick(opt.dataset.field, opt.dataset.val, +opt.dataset.next); }
});

/* ═══════════════════════════════════════
   SCREENS
═══════════════════════════════════════ */

/* ── 1. HERO ── */
function screenHero() {
  return `
  <div class="hero-badge"><span class="dot"></span>\u00c0 partir de 490\u20ac</div>
  <h1 class="hero-title">Votre site internet professionnel <em>livr\u00e9 en 5\u00a0jours</em></h1>
  <p class="hero-sub">R\u00e9pondez \u00e0 4\u00a0questions et on vous appelle dans l\u2019heure pour finaliser votre site.</p>
  <button class="btn-primary" onclick="goTo(2)">Commencer\u00a0\u2014\u00a02\u00a0min ${ARROW}</button>
  <div class="trust-grid">
    <span class="trust-badge">\u23f1\ufe0f Livr\u00e9 en 5\u00a0jours</span>
    <span class="trust-badge">\u2705 Sans abonnement</span>
    <span class="trust-badge">\uD83D\uDCAC Service 7j/7</span>
    <span class="trust-badge">\uD83C\uDF81 Logo + flyers offerts</span>
  </div>`;
}

/* ── 2. Q1 TYPE DE SITE ── */
function screenQ1() {
  const cards = [
    {
      val:`Vitrine`, icon:`\uD83C\uDF10`,
      title:`Site vitrine professionnel`, price:`490\u20ac`,
      desc:`Pr\u00e9senter votre activit\u00e9, recevoir des appels et des demandes de devis. Id\u00e9al pour artisans, commer\u00e7ants, professions lib\u00e9rales.`,
      checks:[`Prise de rendez-vous en ligne`,`Demandes de devis automatiques`,`Photos de vos r\u00e9alisations`,`Avis clients int\u00e9gr\u00e9s`,`Design sur-mesure selon votre m\u00e9tier`]
    },
    {
      val:`Boutique`, icon:`\uD83D\uDED2`,
      title:`Site avec boutique en ligne`, price:`790\u20ac`,
      desc:`Vendre vos produits ou services en ligne avec paiement int\u00e9gr\u00e9. Id\u00e9al pour cr\u00e9ateurs, e-commerce, vente \u00e0 distance.`,
      checks:[`Boutique en ligne compl\u00e8te`,`Paiement s\u00e9curis\u00e9 par carte`,`Tableau de bord pour g\u00e9rer vos articles`,`Modifier prix, photos et stocks vous-m\u00eame`,`Suivi des commandes en temps r\u00e9el`]
    },
    {
      val:`Sur-mesure`, icon:`\uD83C\uDFAF`,
      title:`Projet sur-mesure`, price:`sur devis`, devis:true,
      desc:`Application mobile, plateforme m\u00e9tier, espace client priv\u00e9, fonctionnalit\u00e9s sp\u00e9cifiques. On en discute ensemble pour cr\u00e9er exactement ce dont vous avez besoin.`,
      checks:[`Application mobile iOS et Android`,`Espace client s\u00e9curis\u00e9 avec connexion`,`Plateforme multi-utilisateurs`,`Fonctions personnalis\u00e9es sur-mesure`,`Devis gratuit sous 24h`]
    }
  ];
  return `
  <p class="q-label">Question 1 sur 4</p>
  <h2 class="q-title">Quel type de site souhaitez-vous\u00a0?</h2>
  <p class="q-sub">Nous adapterons notre offre \u00e0 votre besoin.</p>
  ${cards.map(c => `
  <button class="q1-card" data-field="typeSite" data-val="${c.val}" data-next="3">
    <div class="q1-head">
      <div class="q1-icon-title">
        <span class="q1-icon">${c.icon}</span>
        <span class="q1-title">${c.title}</span>
      </div>
      <span class="q1-price${c.devis ? ` devis` : ``}">${c.price}</span>
    </div>
    <p class="q1-desc">${c.desc}</p>
    <ul class="q1-checks">
      ${c.checks.map(ch => `<li>${CHK_OK}${ch}</li>`).join(``)}
    </ul>
  </button>`).join(``)}`;
}

/* ── 3. Q2 MÉTIER ── */
function screenQ2() {
  return `
  <p class="q-label">Question 2 sur 4</p>
  <h2 class="q-title">Quel est votre m\u00e9tier\u00a0?</h2>
  <p class="q-sub">Ex.\u00a0: Coiffeur, Architecte, Plombier, Photographe\u2026</p>
  <div class="field-wrap">
    <input type="text" class="text-input" id="f-metier"
      placeholder="Votre m\u00e9tier ou secteur d\u2019activit\u00e9"
      value="${esc(state.a.metier)}"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="field-error" id="err-metier">Veuillez indiquer votre m\u00e9tier.</div>
  </div>
  <div class="spacer-sm"></div>
  <button class="btn-primary" onclick="continueMetier()">Continuer ${ARROW}</button>`;
}

/* ── 4. Q3 PRÉSENCE GOOGLE ── */
function screenQ3() {
  return `
  <p class="q-label">Question 3 sur 4</p>
  <h2 class="q-title">\u00cates-vous pr\u00e9sent sur Google\u00a0?</h2>
  <p class="q-sub">Fiche Google, site existant, r\u00e9seaux sociaux\u2026</p>
  <div class="options-grid">
    ${optCard(`\u2705`,`Oui`,`J\u2019ai d\u00e9j\u00e0 un site ou une fiche Google`,`presenceGoogle`,`Oui`,5)}
    ${optCard(`\u274C`,`Non`,`Je n\u2019ai aucune pr\u00e9sence en ligne`,`presenceGoogle`,`Non`,5)}
    ${optCard(`\uD83E\uDD37`,`Je ne sais pas`,`Je ne suis pas s\u00fbr(e)`,`presenceGoogle`,`Je ne sais pas`,5)}
  </div>`;
}

/* ── 5. Q4 DÉSIR PRINCIPAL ── */
function screenQ4() {
  return `
  <p class="q-label">Question 4 sur 4</p>
  <h2 class="q-title">Avec un site, qu\u2019est-ce qui vous pla\u00eerait le plus\u00a0?</h2>
  <p class="q-sub">Choisissez ce qui vous correspond le mieux.</p>
  <div class="options-grid">
    ${optCard(`\uD83D\uDCDE`,`Recevoir plus d\u2019appels`,`Attirer de nouveaux clients au t\u00e9l\u00e9phone`,`desirPrincipal`,`Recevoir plus d\u2019appels`,6)}
    ${optCard(`\u2B50`,`Inspirer confiance aux clients`,`Para\u00eetre professionnel et cr\u00e9dible`,`desirPrincipal`,`Inspirer confiance aux clients`,6)}
    ${optCard(`\uD83D\uDCCD`,`\u00catre trouv\u00e9 plus facilement`,`Appara\u00eetre sur Google dans votre ville`,`desirPrincipal`,`\u00catre trouv\u00e9 plus facilement`,6)}
    ${optCard(`\uD83D\uDD52`,`Gagner du temps au t\u00e9l\u00e9phone`,`Moins r\u00e9pondre aux questions basiques`,`desirPrincipal`,`Gagner du temps au t\u00e9l\u00e9phone`,6)}
  </div>`;
}

/* ── 6. RÉCAP ── */
function screenRecap() {
  const a = state.a;
  const typeLabel = a.typeSite === `Vitrine`  ? `Vitrine \u2014 490\u20ac` :
                    a.typeSite === `Boutique` ? `Boutique \u2014 790\u20ac` :
                    a.typeSite || `\u2014`;
  const rows = [
    [`Type de site`,    typeLabel],
    [`M\u00e9tier`,     a.metier          || `\u2014`],
    [`Google`,          a.presenceGoogle  || `\u2014`],
    [`Objectif`,        a.desirPrincipal  || `\u2014`]
  ];
  const btnTxt = a.typeSite === `Sur-mesure` ? `Discuter de mon projet` : `Voir ma proposition`;
  return `
  <p class="q-label">\u2728 Votre profil</p>
  <h2 class="q-title">Votre projet est <span style="color:var(--accent)">r\u00e9alisable</span></h2>
  <p class="recap-delivery">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Livraison pr\u00e9vue avant le\u00a0<strong>${getDeliveryDate()}</strong>
  </p>
  <div class="recap-card">
    ${rows.map(([l,v]) => `<div class="recap-row"><span class="recap-label">${l}</span><span class="recap-val">${esc(v)}</span></div>`).join(``)}
  </div>
  <button class="btn-primary" onclick="goTo(7)">${btnTxt} ${ARROW}</button>
  <p class="note-sm">Sans engagement\u00a0\u2014 100\u00a0% gratuit</p>`;
}

/* ── 7. FORMULAIRE ── */
function screenForm() {
  const isCus = state.fromSurMesure;
  const btnTxt = isCus ? `Recevoir mon devis` :
                 state.a.typeSite === `Boutique` ? `Lancer ma boutique \u2014 790\u20ac` :
                 `Lancer mon site \u2014 490\u20ac`;
  const badges = isCus
    ? [`\uD83D\uDCDE R\u00e9ponse sous 1h`, `\uD83D\uDCCB Devis gratuit`, `\u2705 Sans engagement`]
    : [`\u23f1\ufe0f Livr\u00e9 en 5\u00a0jours`, `\u2705 Sans abonnement`, `\uD83D\uDCAC Service 7j/7`, `\uD83C\uDF81 Logo + flyers offerts`];
  return `
  <h2 class="form-title">${isCus ? `\uD83C\uDFAF Parlons de votre projet` : `\uD83C\uDFAF Plus qu\u2019une \u00e9tape\u00a0!`}</h2>
  <p class="form-sub">${isCus
    ? `On vous appelle dans l\u2019heure pour discuter de votre projet et \u00e9tablir un devis personnalis\u00e9.`
    : `On vous appelle dans l\u2019heure pour finaliser les d\u00e9tails et lancer votre site.`}</p>
  <form id="lead-form" novalidate>
    <div class="form-grid">
      <div>
        <label class="form-label" for="f-prenom">Votre pr\u00e9nom *</label>
        <input type="text" class="text-input" id="f-prenom" placeholder="Jean" autocomplete="given-name" value="${esc(state.a.prenom)}">
        <div class="field-error" id="err-prenom">Veuillez indiquer votre pr\u00e9nom.</div>
      </div>
      <div>
        <label class="form-label" for="f-entreprise">Nom de votre entreprise *</label>
        <input type="text" class="text-input" id="f-entreprise" placeholder="Mon Entreprise" autocomplete="organization" value="${esc(state.a.nomEntreprise)}">
        <div class="field-error" id="err-entreprise">Veuillez indiquer votre entreprise.</div>
      </div>
      <div>
        <label class="form-label" for="f-ville">Votre ville *</label>
        <input type="text" class="text-input" id="f-ville" placeholder="Paris" autocomplete="address-level2" value="${esc(state.a.ville)}">
        <div class="field-error" id="err-ville">Veuillez indiquer votre ville.</div>
      </div>
      <div>
        <label class="form-label" for="f-tel">Votre t\u00e9l\u00e9phone *</label>
        <input type="tel" class="text-input" id="f-tel" placeholder="06 00 00 00 00" autocomplete="tel" inputmode="numeric" value="${esc(state.a.telephone)}">
        <div class="field-error" id="err-tel">Num\u00e9ro invalide (7\u00a0chiffres minimum).</div>
      </div>
    </div>
    <button type="submit" class="btn-primary">${btnTxt} ${ARROW}</button>
  </form>
  <div class="form-badges">
    ${badges.map(b => `<span class="form-badge">${b}</span>`).join(``)}
  </div>
  <div class="trust-bar">
    <span>\u2B50 <strong>4.97/5</strong></span>
    <span class="trust-sep">\u00b7</span>
    <span><strong>170+</strong> sites livr\u00e9s</span>
    <span class="trust-sep">\u00b7</span>
    <span>Livraison en 5\u00a0jours</span>
  </div>`;
}

/* ── 8. CONFIRMATION — refonte ── */
function screenConfirm() {
  const name = esc(state.a.prenom) || `vous`;
  return `
  <div style="text-align:center">
    <div class="confirm-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2 class="confirm-title">C\u2019est bien not\u00e9\u00a0${name}\u00a0!</h2>
    <p class="confirm-sub">Emre, le chef de projet de notre \u00e9quipe, va vous contacter dans l\u2019heure pour finaliser votre site.</p>
  </div>

  <div class="confirm-card">
    <div class="confirm-info-row">
      <span class="confirm-info-icon">\u260E\uFE0F</span>
      <span class="confirm-info-text">Notre \u00e9quipe vous appelle dans l\u2019heure</span>
    </div>
    <div class="confirm-info-row">
      <span class="confirm-info-icon">\uD83D\uDD52</span>
      <span class="confirm-info-text">Service client disponible 7j/7</span>
    </div>
    <div class="confirm-info-row">
      <span class="confirm-info-icon wa-icon">\uD83D\uDCAC</span>
      <span class="confirm-info-text wa-text">Disponible aussi sur WhatsApp</span>
    </div>
  </div>

  <button class="btn-primary xl" onclick="window.location.href='/'">
    Voir nos r\u00e9alisations ${ARROW}
  </button>
  <p class="confirm-note">En attendant notre appel, d\u00e9couvrez les sites qu\u2019on a livr\u00e9s r\u00e9cemment.</p>

  <div class="trust-bar" style="margin-top:24px">
    <span>\u2B50 <strong>4.97/5</strong></span>
    <span class="trust-sep">\u00b7</span>
    <span><strong>170+</strong> sites livr\u00e9s</span>
    <span class="trust-sep">\u00b7</span>
    <span>D\u00e9lai moyen 5\u00a0jours</span>
  </div>`;
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render() {
  const map = {1:screenHero, 2:screenQ1, 3:screenQ2, 4:screenQ3, 5:screenQ4, 6:screenRecap, 7:screenForm, 8:screenConfirm};
  document.getElementById(`screen-container`).innerHTML = (map[state.step] || screenHero)();

  /* Progress */
  const show = state.step >= 2 && state.step <= 7;
  document.getElementById(`progress-wrap`).classList.toggle(`hidden`, !show);
  const pb = document.getElementById(`progress-bar`);
  if (pb) pb.style.width = (PROGRESS[state.step] || 0) + `%`;

  /* Back button */
  document.getElementById(`btn-back`).classList.toggle(`hidden`, HIDE_BACK.has(state.step));

  /* Listeners */
  const form = document.getElementById(`lead-form`);
  if (form) form.addEventListener(`submit`, submitForm);
  const mi = document.getElementById(`f-metier`);
  if (mi) mi.addEventListener(`keydown`, e => { if (e.key === `Enter`) continueMetier(); });
}

/* ═══════════════════════════════════════
   FORM LOGIC
═══════════════════════════════════════ */
function continueMetier() {
  const inp = document.getElementById(`f-metier`);
  const err = document.getElementById(`err-metier`);
  if (!inp) return;
  const val = inp.value.trim();
  if (val.length < 2) {
    inp.classList.add(`error`);
    if (err) err.classList.add(`show`);
    inp.focus();
    return;
  }
  state.a.metier = val;
  goTo(4);
}

function submitForm(e) {
  e.preventDefault();
  const fields = [
    {id:`f-prenom`,    key:`prenom`,       errId:`err-prenom`,    ok: v => v.length >= 2},
    {id:`f-entreprise`,key:`nomEntreprise`, errId:`err-entreprise`,ok: v => v.length >= 2},
    {id:`f-ville`,     key:`ville`,         errId:`err-ville`,     ok: v => v.length >= 2},
    {id:`f-tel`,       key:`telephone`,     errId:`err-tel`,       ok: v => v.replace(/\D/g,``).length >= 7}
  ];
  let valid = true;
  fields.forEach(f => {
    const inp = document.getElementById(f.id);
    const err = document.getElementById(f.errId);
    if (!inp) return;
    const val = inp.value.trim();
    const ok  = f.ok(val);
    inp.classList.toggle(`error`, !ok);
    if (err) err.classList.toggle(`show`, !ok);
    if (ok) state.a[f.key] = val;
    else valid = false;
  });
  if (!valid) return;

  try {
    const arr = JSON.parse(localStorage.getItem(`qv_leads`) || `[]`);
    arr.unshift(Object.assign({}, state.a, {
      date: new Date().toLocaleDateString(`fr-FR`),
      timestamp: Date.now()
    }));
    localStorage.setItem(`qv_leads`, JSON.stringify(arr));
  } catch(_) {}

  // TODO: Supabase — await sb.from('leads').insert(lead);
  // TODO: Meta Pixel — fbq('track','Lead',{value: state.a.typeSite === 'Boutique' ? 790 : 490, currency:'EUR'});

  goTo(8);
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
render();
</script>
</body>
</html>
